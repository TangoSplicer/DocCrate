name: Build Private Gumroad Artifacts

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: DocCrate-Windows-exe
            bundle_path: target/release/bundle/nsis/*.exe
          - os: ubuntu-22.04
            artifact_name: DocCrate-Linux-AppImage
            bundle_path: target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.5.0"

      - name: Build Application
        run: cargo tauri build
        working-directory: crates/desktop

      - name: Upload Artifacts for Gumroad
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_path }}
          retention-days: 5
