<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocCrate Studio</title>
    <style>
        :root { --bg: #f6f8fa; --card: #ffffff; --border: #d0d7de; --text: #24292f; --primary: #2da44e; --primary-hover: #2c974b; --accent: #0969da; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; padding: 2rem; background-color: var(--bg); color: var(--text); }
        .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 14px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .tabs { display: flex; gap: 1rem; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; padding-bottom: 0.5rem; }
        .tab-btn { background: none; border: none; font-size: 1.2rem; font-weight: 600; color: #57606a; cursor: pointer; padding: 0.5rem 1rem; border-radius: 6px; }
        .tab-btn.active { color: var(--accent); background: #ddf4ff; }
        .view { display: none; }
        .view.active { display: block; }
        .controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        input[type="text"] { flex-grow: 1; min-width: 200px; padding: 10px; border-radius: 6px; border: 1px solid var(--border); font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: var(--accent); }
        button { padding: 10px 20px; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-add { background-color: var(--bg); border: 1px solid var(--border); color: var(--text); }
        .btn-add:hover { background-color: #e5e7eb; }
        .btn-build { background-color: var(--primary); color: white; width: 100%; margin-top: 1rem; }
        .btn-build:hover { background-color: var(--primary-hover); }
        .btn-build:disabled { background-color: #94d3a2; cursor: not-allowed; }
        .queue-box { border: 1px solid var(--border); border-radius: 6px; min-height: 150px; padding: 1rem; background: #fafbfc; }
        .queue-title { font-weight: 600; margin-bottom: 1rem; color: #57606a; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        #queue-list { list-style: none; padding: 0; margin: 0; }
        #queue-list li { padding: 8px; border-bottom: 1px solid var(--border); background: var(--card); border-radius: 4px; margin-bottom: 4px; display: flex; align-items: center; word-break: break-all;}
        #queue-list li::before { content: '📦'; margin-right: 10px; }
        #status-msg { margin-top: 1rem; font-weight: 600; text-align: center; color: var(--primary); }
        .reader-layout { display: flex; flex-direction: row; gap: 1rem; margin-top: 1rem; height: 60vh; min-height: 400px; }
        .sidebar { flex: 1; min-width: 200px; border: 1px solid var(--border); border-radius: 6px; background: white; overflow-y: auto; padding: 0.5rem; }
        .content-pane { flex: 2.5; border: 1px solid var(--border); border-radius: 6px; background: white; padding: 1.5rem; overflow-y: auto; }
        .file-item { padding: 8px; cursor: pointer; border-radius: 4px; margin-bottom: 2px; font-size: 0.9rem; word-break: break-all; }
        .file-item:hover { background: var(--bg); }
        .file-item.active { background: #ddf4ff; color: var(--accent); font-weight: 600; }
        .markdown-body { font-size: 1rem; line-height: 1.6; word-wrap: break-word; }
        .markdown-body h1, .markdown-body h2 { border-bottom: 1px solid var(--border); padding-bottom: 0.3em; margin-top: 24px; margin-bottom: 16px; }
        .markdown-body code { background-color: rgba(175, 184, 193, 0.2); padding: 0.2em 0.4em; border-radius: 6px; font-family: monospace; font-size: 0.9em; }
        .markdown-body pre { background-color: #f6f8fa; padding: 16px; border-radius: 6px; overflow: auto; }
        .markdown-body pre code { background-color: transparent; padding: 0; }
        .markdown-body blockquote { margin: 0; padding: 0 1em; color: #57606a; border-left: 0.25em solid #d0d7de; }
        .markdown-body a { color: var(--accent); text-decoration: none; }
        @media (max-width: 700px) {
            .reader-layout { flex-direction: column; height: auto; }
            .sidebar { height: 200px; flex: none; }
            .content-pane { height: 400px; flex: none; }
            .tabs { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('publisher')">🛠️ Publisher Mode</button>
            <button class="tab-btn" onclick="switchTab('reader')">📖 Reader Mode</button>
        </div>
        
        <div id="publisher-view" class="view active">
            <p>Curate your sources to build an offline Master Library.</p>
            <div class="controls">
                <input type="text" id="source-input" placeholder="e.g., https://github.com/TangoSplicer/project-aletheia.git">
                <button class="btn-add" onclick="addSource()">+ Add to Queue</button>
            </div>
            <div class="queue-box">
                <div class="queue-title">Staged Sources</div>
                <ul id="queue-list"><li><em>Loading queue...</em></li></ul>
            </div>
            <button id="build-btn" class="btn-build" onclick="buildDocs()">🚀 Build & Pack Library</button>
            <div id="status-msg"></div>
        </div>

        <div id="reader-view" class="view">
            <button class="btn-add" style="width: 100%; border-color: var(--accent); color: var(--accent);" onclick="openPack()">📂 Select .docpack File</button>
            <div id="current-pack" style="margin-top: 10px; font-size: 0.85rem; color: #57606a; text-align: center;">No pack loaded</div>
            
            <div class="reader-layout">
                <div style="flex: 1; display: flex; flex-direction: column; gap: 0.5rem; min-width: 200px;">
                    <input type="text" id="search-input" placeholder="🔍 Search library (Press Enter)..." onkeyup="handleSearch(event)" style="width: 100%; box-sizing: border-box;">
                    <div class="sidebar" id="file-sidebar" style="flex: 1; margin: 0;">
                        <div style="padding: 10px; color: gray; text-align: center; font-size: 0.9rem;">Files will appear here</div>
                    </div>
                </div>
                <div class="content-pane">
                    <div id="markdown-viewer" class="markdown-body"><em>Load a library and select a document to read...</em></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { invoke, dialog } = window.__TAURI__.tauri;
        let currentPackPath = "";

        function switchTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId + '-view').classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function refreshQueue() {
            try {
                const sources = await invoke('get_staged_sources');
                const list = document.getElementById('queue-list');
                list.innerHTML = ''; 
                if (sources.length === 0) { list.innerHTML = '<li><em>Your queue is empty.</em></li>'; return; }
                sources.forEach(src => {
                    const li = document.createElement('li');
                    li.textContent = src;
                    list.appendChild(li);
                });
            } catch (e) { console.error(e); }
        }

        async function addSource() {
            const input = document.getElementById('source-input');
            if (!input.value.trim()) return;
            try {
                await invoke('add_source', { source: input.value.trim() });
                input.value = ''; 
                refreshQueue();   
            } catch (e) { alert("Error: " + e); }
        }

        async function buildDocs() {
            const btn = document.getElementById('build-btn');
            const status = document.getElementById('status-msg');
            btn.disabled = true; btn.textContent = "⚙️ Engine Running (Cloning & Packing)...";
            status.textContent = ""; status.style.color = "var(--primary)";
            try {
                const result = await invoke('build_library');
                status.textContent = "✅ " + result;
            } catch (e) {
                status.style.color = "red"; status.textContent = "❌ " + e;
            } finally {
                btn.disabled = false; btn.textContent = "🚀 Build & Pack Library";
            }
        }

        async function openPack() {
            try {
                const selected = await dialog.open({
                    title: 'Select a DocCrate Library',
                    filters: [{ name: 'DocCrate Pack', extensions: ['docpack'] }]
                });
                if (selected) {
                    currentPackPath = selected;
                    document.getElementById('current-pack').textContent = "Loaded: " + selected;
                    await loadSidebar(selected);
                }
            } catch (e) { alert("Error opening dialog: " + e); }
        }

        async function loadSidebar(path) {
            const sidebar = document.getElementById('file-sidebar');
            sidebar.innerHTML = '<div style="padding:10px;">Reading index...</div>';
            try {
                const files = await invoke('list_pack_files', { path: path });
                populateSidebar(sidebar, files);
            } catch (e) { sidebar.innerHTML = `<div style="padding:10px; color:red;">Error: ${e}</div>`; }
        }

        function populateSidebar(sidebar, files) {
            sidebar.innerHTML = '';
            if (files.length === 0) { sidebar.innerHTML = '<div style="padding:10px; color:gray;">No matching files found.</div>'; return; }
            files.forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.textContent = file;
                div.onclick = () => loadDocument(file, div);
                sidebar.appendChild(div);
            });
        }

        async function loadDocument(fileName, element) {
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            const viewer = document.getElementById('markdown-viewer');
            viewer.innerHTML = "<em>Extracting and rendering document...</em>";
            try {
                const htmlContent = await invoke('read_pack_file', { path: currentPackPath, target: fileName });
                viewer.innerHTML = htmlContent;
            } catch (e) { viewer.innerHTML = "<span style='color:red'>Error reading file:<br>" + e + "</span>"; }
        }

        async function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = event.target.value.trim();
                if (!currentPackPath) {
                    alert("Please select a .docpack file first!");
                    return;
                }
                const sidebar = document.getElementById('file-sidebar');
                if (query === '') {
                    loadSidebar(currentPackPath); 
                    return;
                }
                sidebar.innerHTML = '<div style="padding:10px;">Searching...</div>';
                try {
                    const results = await invoke('search_pack_files', { path: currentPackPath, query: query });
                    sidebar.innerHTML = `<div style="padding:10px; font-weight:bold; font-size:0.8rem; color:var(--primary);">Found ${results.length} matches</div>`;
                    results.forEach(file => {
                        const div = document.createElement('div');
                        div.className = 'file-item';
                        div.textContent = file;
                        div.onclick = () => loadDocument(file, div);
                        sidebar.appendChild(div);
                    });
                } catch (e) { sidebar.innerHTML = `<div style="padding:10px; color:red;">Search error: ${e}</div>`; }
            }
        }

        window.addEventListener('DOMContentLoaded', refreshQueue);
    </script>
</body>
</html>
