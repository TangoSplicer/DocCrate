<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocCrate Studio</title>
    <style>
        :root { --bg: #f6f8fa; --card: #ffffff; --border: #d0d7de; --text: #24292f; --primary: #2da44e; --primary-hover: #2c974b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; padding: 2rem; background-color: var(--bg); color: var(--text); }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 14px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        h1 { margin-top: 0; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }
        .controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        input[type="text"] { flex-grow: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--border); font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }
        button { padding: 10px 20px; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-add { background-color: var(--bg); border: 1px solid var(--border); color: var(--text); }
        .btn-add:hover { background-color: #e5e7eb; }
        .btn-build { background-color: var(--primary); color: white; width: 100%; margin-top: 1rem; }
        .btn-build:hover { background-color: var(--primary-hover); }
        .btn-build:disabled { background-color: #94d3a2; cursor: not-allowed; }
        .queue-box { border: 1px solid var(--border); border-radius: 6px; min-height: 150px; padding: 1rem; background: #fafbfc; }
        .queue-title { font-weight: 600; margin-bottom: 1rem; color: #57606a; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        #queue-list { list-style: none; padding: 0; margin: 0; }
        #queue-list li { padding: 8px; border-bottom: 1px solid var(--border); background: var(--card); border-radius: 4px; margin-bottom: 4px; display: flex; align-items: center;}
        #queue-list li::before { content: '📦'; margin-right: 10px; }
        #status-msg { margin-top: 1rem; font-weight: 600; text-align: center; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗃️ DocCrate Studio</h1>
        <p>Curate your sources to build an offline Master Library.</p>
        
        <div class="controls">
            <input type="text" id="source-input" placeholder="e.g., https://github.com/TangoSplicer/project-aletheia.git">
            <button class="btn-add" onclick="addSource()">+ Add to Queue</button>
        </div>

        <div class="queue-box">
            <div class="queue-title">Staged Sources</div>
            <ul id="queue-list">
                <li><em>Loading queue...</em></li>
            </ul>
        </div>

        <button id="build-btn" class="btn-build" onclick="buildDocs()">🚀 Build & Pack Library</button>
        <div id="status-msg"></div>
    </div>

    <script>
        const { invoke } = window.__TAURI__.tauri;

        async function refreshQueue() {
            try {
                const sources = await invoke('get_staged_sources');
                const list = document.getElementById('queue-list');
                list.innerHTML = ''; 

                if (sources.length === 0) {
                    list.innerHTML = '<li><em>Your queue is empty.</em></li>';
                    return;
                }

                sources.forEach(src => {
                    const li = document.createElement('li');
                    li.textContent = src;
                    list.appendChild(li);
                });
            } catch (e) {
                console.error("Failed to load queue:", e);
            }
        }

        async function addSource() {
            const input = document.getElementById('source-input');
            const sourceUrl = input.value.trim();
            if (!sourceUrl) return;

            try {
                await invoke('add_source', { source: sourceUrl });
                input.value = ''; 
                refreshQueue();   
            } catch (e) {
                alert("Error adding source: " + e);
            }
        }

        async function buildDocs() {
            const btn = document.getElementById('build-btn');
            const status = document.getElementById('status-msg');
            
            btn.disabled = true;
            btn.textContent = "⚙️ Building Library...";
            status.textContent = "";
            status.style.color = "var(--primary)";

            try {
                const result = await invoke('build_library');
                status.textContent = "✅ " + result;
            } catch (e) {
                status.style.color = "red";
                status.textContent = "❌ Error: " + e;
            } finally {
                btn.disabled = false;
                btn.textContent = "🚀 Build & Pack Library";
            }
        }

        window.addEventListener('DOMContentLoaded', refreshQueue);
    </script>
</body>
</html>
